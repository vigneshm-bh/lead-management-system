server:
  port: 8080

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/lead_management
    username:
    password:
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.xml

app:
  jwt:
    secret: dGhpcyBpcyBhIHZlcnkgc2VjdXJlIGtleSBmb3IgSldUIHRva2VuIGdlbmVyYXRpb24gMTIzNDU2Nzg5MA==
    access-token-expiration-ms: 900000
    refresh-token-expiration-ms: 604800000
  cookie:
    secure: false
    same-site: lax
    domain: localhost
  scheduler:
    token-cleanup-cron: "0 0 * * * *"

